# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"
  - "Cursor"

ai_usage_summary: |
  Used Claude for idea brainstorming and architectural discussion — thinking
  through the honeypot gate design, the multiplicative behavioral model, and
  the Gaussian experience curve. Used Cursor for autocomplete while writing
  boilerplate and repetitive code patterns.
  All core architecture, design decisions, and logic were independently
  conceived by the team. No candidate data was fed to any external LLM at
  any point. The ranking pipeline itself contains zero LLM calls — fully
  rule-based and deterministic.
# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Rule-based, fully deterministic ranker. Candidates are streamed one-by-one
  (constant memory) and hard-gated through a 6-signal honeypot detector
  requiring 2+ corroborating signals before exclusion — preventing false
  positives from data-entry noise.

  Clean candidates are scored across four independent dimensions: Career
  (title tier + keyword depth + consulting/hopper penalties), Skills
  (must-have/nice-to-have coverage + suspicious-skill exclusion), Experience
  (Gaussian curve peaked at 7 years + ML-specific years from career
  descriptions), and Location (hub proximity + notice period). These are
  combined as a weighted sum (0.30 + 0.20 + 0.15 + 0.10).

  A behavioral availability multiplier [0.2, 1.3] is then applied
  multiplicatively — ensuring that ghost profiles with excellent paper scores
  but 5% response rates are collapsed regardless of technical merit.

  Performance: ~97 seconds for 100K candidates on standard CPU. Zero ML
  models, zero API calls, zero randomness. Same input + same --ref-date =
  identical output, guaranteed.

